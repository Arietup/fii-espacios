name: Deploy to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Validate, migrate, and deploy production
    runs-on: ubuntu-latest

    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$AUTH_SECRET" || (echo "Missing AUTH_SECRET" && exit 1)
          test -n "$DATABASE_URL" || (echo "Missing DATABASE_URL" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing VERCEL_PROJECT_ID" && exit 1)
          test -n "$VERCEL_TOKEN" || (echo "Missing VERCEL_TOKEN" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint

      - name: Run production build validation
        run: npm run build

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
